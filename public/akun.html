<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun - Adi Jaya Store</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-bg { background-color: #0f4c5c; }
        .card-bg-dark { background-color: #124e5e; }
        .card-inner-bg { background-color: #1a7e91; }
    </style>
</head>
<body class="bg-white flex h-screen font-sans">

    <aside class="w-64 sidebar-bg text-white flex flex-col fixed h-full z-10 rounded-e-3xl">
        <div class="p-6"></div>
        <nav class="flex-1 px-4 space-y-4">
            <a href="akun.html" class="flex items-center p-3 bg-gray-300 text-gray-800 rounded-l-full -mr-4 shadow-lg transition relative">
                <i class="fas fa-user-circle w-8 text-xl"></i>
                <span class="font-bold">Profil</span>
            </a>
            <a href="transaksi.html" class="flex items-center p-3 hover:bg-white/10 rounded-lg transition">
                <i class="fas fa-exchange-alt w-8 text-xl"></i>
                <span class="font-semibold">Transaksi</span>
            </a>
            <a href="help.html" class="flex items-center p-3 hover:bg-white/10 rounded-lg transition">
                <i class="fas fa-exclamation-circle w-8 text-xl"></i>
                <span class="font-semibold">Help</span>
            </a>
            <button onclick="showLogoutModal()" class="flex items-center w-full p-3 hover:bg-white/10 rounded-lg transition mt-8 text-left text-red-200">
                <i class="fas fa-sign-out-alt w-8 text-xl"></i>
                <span class="font-semibold">Logout</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 ml-64 p-12">
        
        <div class="card-bg-dark rounded-3xl p-6 shadow-2xl max-w-4xl mx-auto flex flex-col md:flex-row items-center gap-8 relative mt-10">
            
            <div class="bg-white p-2 rounded-2xl shadow-lg -mt-12 md:-mt-0 md:-ml-12 z-10 w-48 h-48 border-4 border-teal-600 flex-shrink-0">
                <img id="profile-img" src="" alt="Foto Profil" class="w-full h-full object-cover rounded-xl">
            </div>

            <div class="card-inner-bg flex-1 p-8 rounded-xl w-full text-white shadow-inner">
                <h2 id="profile-role" class="text-center text-lg font-medium mb-6 border-b border-white/30 pb-2 capitalize">
                    Loading...
                </h2>
                
                <div class="space-y-6">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-sm opacity-90 w-24">Nama :</span>
                            <span id="profile-nama" class="font-semibold text-lg">...</span>
                        </div>
                        <div class="h-px bg-white/50 w-full"></div>
                    </div>

                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-sm opacity-90 w-24">Username :</span>
                            <span id="profile-username" class="font-semibold text-lg">...</span>
                        </div>
                        <div class="h-px bg-white/50 w-full"></div>
                    </div>

                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-sm opacity-90 w-24">Password :</span>
                            <span id="profile-password" class="font-semibold text-lg tracking-widest">********</span>
                        </div>
                        <div class="h-px bg-white/50 w-full"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="logoutModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-8 w-96 text-center shadow-2xl relative">
            <h3 class="text-2xl font-bold text-teal-700 mb-6">Logout</h3>
            <div class="bg-gray-200 py-4 px-2 rounded mb-6">
                <p class="text-teal-800 font-bold text-lg">Apakah anda ingin keluar dari website?</p>
            </div>
            <div class="flex justify-center gap-4">
                <button onclick="doLogout()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full shadow-lg transition">
                    Ya
                </button>
                <button onclick="closeLogoutModal()" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded-full shadow-lg transition">
                    Tidak
                </button>
            </div>
        </div>
    </div>
    <script>
        // 1. Cek Sesi Login
        const sessionData = localStorage.getItem('user_session');
        if (!sessionData) {
            window.location.href = 'login.html';
        }

        const user = JSON.parse(sessionData);

        // 2. Isi Data ke HTML (DOM Manipulation)
        // Foto
        document.getElementById('profile-img').src = user.foto || 'https://via.placeholder.com/150';
        
        // Role (Judul di atas kartu)
        document.getElementById('profile-role').innerText = user.role;
        document.getElementById('profile-nama').innerText = user.nama;
        
        // Username
        document.getElementById('profile-username').innerText = user.username;
        
        // Password
        // Opsi A: Tampilkan bintang fix (lebih aman & rapi sesuai mockup)
        document.getElementById('profile-password').innerText = '********'; 
        
        // Opsi B: Jika ingin jumlah bintang sesuai panjang password asli, pakai baris ini:
        // document.getElementById('profile-password').innerText = '*'.repeat(user.password.length);

        // Fungsi Logout
        function showLogoutModal() {
            document.getElementById('logoutModal').classList.remove('hidden');
        }
        function closeLogoutModal() {
            document.getElementById('logoutModal').classList.add('hidden');
        }
        function doLogout() {
            localStorage.removeItem('user_session');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
