<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Stok - Toko Adi Jaya</title>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-white shadow-sm p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold text-blue-600">Toko Adi Jaya</a>
            <div>
                <a href="/" class="text-gray-600 hover:text-blue-600 mr-4">Katalog</a>
                <a href="/laporan.html" class="text-blue-600 font-semibold">Laporan Stok</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 sm:px-8">
        <div class="py-4">
            <h2 class="text-3xl font-bold leading-tight mb-6">Laporan Stok</h2>
            
            <div class="-mx-4 sm:-mx-8 px-4 sm:px-8 py-4 overflow-x-auto">
                <div class="inline-block min-w-full shadow-md rounded-lg overflow-hidden">
                    
                    <table class="min-w-full leading-normal">
                        <thead>
                            <tr>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    No.
                                </th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Kode Barang
                                </th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Nama Barang
                                </th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                                    Stok Saat Ini
                                </th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-center text-xs font-semibold text-green-700 uppercase tracking-wider">
                                    Masuk
                                </th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-center text-xs font-semibold text-red-700 uppercase tracking-wider">
                                    Keluar
                                </th>
                                </tr>
                        </thead>
                        
                        <tbody id="laporan-body" class="bg-white">
                            <tr>
                                <td colspan="6" class="px-5 py-5 border-b border-gray-200 text-sm text-center text-gray-500">
                                    Memuat data laporan...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadLaporan() {
            try {
                // Panggil API khusus yang baru kita buat
                const response = await fetch('/api/laporan-stok');
                const data = await response.json();

                const tbody = document.getElementById('laporan-body');
                tbody.innerHTML = ''; // Kosongkan indikator loading

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">Belum ada data barang.</td></tr>';
                    return;
                }

                // Loop data dan buat baris tabel (<tr>)
                let nomor = 1;
                data.forEach(item => {
                    // Tentukan warna untuk stok masuk/keluar jika ada nilainya
                    const masukClass = item.total_masuk > 0 ? 'text-green-600 font-semibold' : 'text-gray-400';
                    const keluarClass = item.total_keluar > 0 ? 'text-red-600 font-semibold' : 'text-gray-400';

                    const row = `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-5 py-4 border-b border-gray-200 text-sm text-gray-600">
                                ${nomor++}
                            </td>
                            <td class="px-5 py-4 border-b border-gray-200 text-sm font-medium text-gray-800">
                                ${item.kode_barang}
                            </td>
                            <td class="px-5 py-4 border-b border-gray-200 text-sm text-gray-700">
                                ${item.nama_barang}
                            </td>
                            <td class="px-5 py-4 border-b border-gray-200 text-sm font-bold text-gray-800">
                                ${item.stok_saat_ini}
                            </td>
                            <td class="px-5 py-4 border-b border-gray-200 text-sm text-center ${masukClass}">
                                ${item.total_masuk}
                            </td>
                            <td class="px-5 py-4 border-b border-gray-200 text-sm text-center ${keluarClass}">
                                ${item.total_keluar}
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('laporan-body').innerHTML = 
                    '<tr><td colspan="6" class="text-center text-red-500 py-4">Gagal memuat data. Pastikan server backend berjalan.</td></tr>';
            }
        }

        // Jalankan fungsi saat halaman dibuka
        loadLaporan();
    </script>
    <script>
        if (!localStorage.getItem('user_session')) window.location.href = 'login.html';
        function doLogout() { localStorage.removeItem('user_session'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
