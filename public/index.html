<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog - Adi Jaya Store</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-bg { background-color: #0f4c5c; }
        .btn-teal { background-color: #1a6f80; }
        /* Animasi Loading */
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex h-screen font-sans overflow-hidden">

    <script>
        // Jika tidak ada sesi user, tendang ke login
        if (!localStorage.getItem('user_session')) {
            window.location.href = 'login.html';
        }
    </script>

    <aside class="w-64 sidebar-bg text-white flex flex-col fixed h-full z-10">
        <div class="p-6"></div>
        
        <nav class="flex-1 px-4 space-y-4">
            <a href="index.html" class="flex items-center p-3 bg-gray-300 text-gray-800 rounded-l-full -mr-4 shadow-lg transition relative">
                <i class="fas fa-home w-8 text-xl"></i>
                <span class="font-bold">Katalog</span>
            </a>

            <a href="akun.html" class="flex items-center p-3 hover:bg-white/10 rounded-lg transition">
                <i class="fas fa-user-circle w-8 text-xl"></i>
                <span class="font-semibold">Akun</span>
            </a>
            
            <a href="transaksi.html" class="flex items-center p-3 hover:bg-white/10 rounded-lg transition">
                <i class="fas fa-exchange-alt w-8 text-xl"></i>
                <span class="font-semibold">Transaksi</span>
            </a>

            <a href="help.html" class="flex items-center p-3 hover:bg-white/10 rounded-lg transition">
                <i class="fas fa-exclamation-circle w-8 text-xl"></i>
                <span class="font-semibold">Help</span>
            </a>

            <button onclick="showLogoutModal()" class="flex items-center w-full p-3 hover:bg-white/10 rounded-lg transition mt-8 text-left">
                <i class="fas fa-sign-out-alt w-8 text-xl"></i>
                <span class="font-semibold">Logout</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 ml-64 p-8 overflow-y-auto h-full">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-teal-800">Katalog Barang</h1>
            <div class="flex items-center gap-4">
                <span id="userWelcome" class="text-gray-600 font-medium">Halo, Kasir</span>
                <div class="bg-teal-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold">
                    K
                </div>
            </div>
        </div>

        <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="col-span-full flex justify-center py-20">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
            </div>
        </div>
    </main>

    <div id="logoutModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-8 w-96 text-center shadow-2xl relative">
            <h3 class="text-2xl font-bold text-teal-700 mb-6">Logout</h3>
            <div class="bg-gray-200 py-4 px-2 rounded mb-6">
                <p class="text-teal-800 font-bold text-lg">Apakah anda ingin keluar dari website?</p>
            </div>
            <div class="flex justify-center gap-4">
                <button onclick="doLogout()" class="bg-gray-300 hover:bg-gray-400 text-teal-900 font-bold py-2 px-8 rounded shadow transition">Ya</button>
                <button onclick="closeLogoutModal()" class="bg-gray-300 hover:bg-gray-400 text-teal-900 font-bold py-2 px-8 rounded shadow transition">Tidak</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Tampilkan Nama User dari Sesi
        const session = JSON.parse(localStorage.getItem('user_session'));
        if (session) {
            document.getElementById('userWelcome').innerText = `Halo, ${session.nama}`;
        }

        // 2. Logic Modal Logout
        function showLogoutModal() { document.getElementById('logoutModal').classList.remove('hidden'); }
        function closeLogoutModal() { document.getElementById('logoutModal').classList.add('hidden'); }
        function doLogout() {
            localStorage.removeItem('user_session');
            window.location.href = 'login.html';
        }

        // 3. Fetch Data Barang (Katalog)
        async function loadProducts() {
            try {
                const response = await fetch('/api/barang');
                const products = await response.json();
                const container = document.getElementById('product-container');
                
                container.innerHTML = ''; // Hapus loader

                if (products.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500 col-span-full">Belum ada data barang.</p>';
                    return;
                }

                products.forEach(item => {
                    const harga = parseFloat(item.harga_jual).toLocaleString('id-ID');
                    // Tentukan warna stok (Merah jika sedikit)
                    const stokColor = item.stok < 10 ? 'text-red-600' : 'text-gray-600';

                    const card = `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 border border-gray-100 group">
                            <div class="h-40 bg-teal-50 flex flex-col items-center justify-center group-hover:bg-teal-100 transition-colors">
                                <i class="fas fa-box-open text-4xl text-teal-300 mb-2"></i>
                                <span class="text-xs text-teal-600 font-mono bg-white px-2 py-1 rounded shadow-sm">${item.kode_barang}</span>
                            </div>
                            <div class="p-5">
                                <h3 class="text-lg font-bold text-gray-800 mb-1 truncate">${item.nama_barang}</h3>
                                
                                <div class="flex justify-between items-center text-sm mb-4">
                                    <span class="${stokColor} font-medium"><i class="fas fa-cubes mr-1"></i> Stok: ${item.stok}</span>
                                </div>

                                <div class="flex justify-between items-center border-t pt-4">
                                    <span class="text-teal-700 font-bold text-lg">Rp ${harga}</span>
                                    <a href="transaksi.html" class="bg-teal-600 hover:bg-teal-700 text-white px-3 py-2 rounded-lg text-sm transition-colors shadow-sm">
                                        <i class="fas fa-cart-plus"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

            } catch (error) {
                console.error('Gagal mengambil data:', error);
                document.getElementById('product-container').innerHTML = 
                    '<p class="text-center text-red-500 col-span-full">Gagal memuat data server.</p>';
            }
        }

        // Jalankan saat halaman siap
        loadProducts();
    </script>
</body>
</html>
