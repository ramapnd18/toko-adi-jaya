<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - Adi Jaya Store</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-bg { background-color: #0f4c5c; }
        .btn-teal { background-color: #1a6f80; }
        .card-teal { background-color: #157f8f; }
    </style>
</head>
<body class="bg-white flex h-screen overflow-hidden font-sans">

    <aside class="w-64 sidebar-bg text-white flex flex-col fixed h-full z-10">
        <div class="p-6">
            </div>
        
        <nav class="flex-1 px-4 space-y-4">
            <a href="akun.html" class="flex items-center p-3 hover:bg-white/10 rounded-lg transition">
                <i class="fas fa-user-circle w-8 text-xl"></i>
                <span class="font-semibold">Akun</span>
            </a>
            
            <a href="transaksi.html" class="flex items-center p-3 bg-gray-300 text-gray-800 rounded-l-full -mr-4 shadow-lg transition relative">
                <i class="fas fa-exchange-alt w-8 text-xl"></i>
                <span class="font-bold">Transaksi</span>
            </a>

            <a href="help.html" class="flex items-center p-3 hover:bg-white/10 rounded-lg transition">
                <i class="fas fa-exclamation-circle w-8 text-xl"></i>
                <span class="font-semibold">Help</span>
            </a>

            <a href="logout.html" class="flex items-center w-full p-3 hover:bg-white/10 rounded-lg transition mt-8 text-left">
                <i class="fas fa-sign-out-alt w-8 text-xl"></i>
                <span class="font-semibold">Logout</span>
            </a>
        </nav>
    </aside>

    <div id="logoutModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-8 w-96 text-center shadow-2xl relative">
            <h3 class="text-2xl font-bold text-teal-700 mb-6">Logout</h3>
            
            <div class="bg-gray-200 py-4 px-2 rounded mb-6">
                <p class="text-teal-800 font-bold text-lg">Apakah anda ingin keluar dari website?</p>
            </div>

            <div class="flex justify-center gap-4">
                <button onclick="doLogout()" class="bg-gray-300 hover:bg-gray-400 text-teal-900 font-bold py-2 px-8 rounded shadow transition">
                    Ya
                </button>
                <button onclick="closeLogoutModal()" class="bg-gray-300 hover:bg-gray-400 text-teal-900 font-bold py-2 px-8 rounded shadow transition">
                    Tidak
                </button>
            </div>
        </div>
    </div>

    <script>
        // Cek Login
        if (!localStorage.getItem('user_session')) {
            window.location.href = 'login.html';
        }

        function doLogout() {
            localStorage.removeItem('user_session');
            window.location.href = 'login.html';
        }

        function closeLogoutModal() {
            document.getElementById('logoutModal').classList.add('hidden');
        }
    </script>
</body>
</html>
